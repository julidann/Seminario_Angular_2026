<div class="row g-4">
  <div class="col-12 col-md-6 col-lg-4" *ngFor="let prod of products">
    <!-- Aplicamos clase condicional 'out-of-stock' cuando el stock es 0 -->
    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative"
         [class.out-of-stock]="prod.stock === 0">
      
      <!-- Badge de SIN STOCK -->
      <span *ngIf="prod.stock === 0" class="badge bg-secondary position-absolute top-0 start-0 m-3 z-1">SIN STOCK</span>
      
      <!-- Indicador de Oferta -->
      <span *ngIf="prod.clearance" class="badge bg-primary position-absolute top-0 end-0 m-3 z-1">OFERTA</span>

      <img [src]="prod.image" class="card-img-top" style="height: 200px; object-fit: cover;">
      
      <div class="card-body">
        <h5 class="card-title fw-bold text-dark">{{ prod.name }}</h5>
        <p class="text-muted small mb-2">{{ prod.type }}</p>
        <h4 class="text-primary mb-3">{{ prod.price | currency:'ARS':'symbol-narrow':'1.0-0' }}</h4>
        
        <div class="d-flex align-items-center mb-3">
          <small class="me-2 text-muted">Stock: {{ prod.stock }}</small>
          <app-input-integer [(quantity)]="prod.quantity" [max]="prod.stock" class="ms-auto"></app-input-integer>
        </div>

        <div class="d-grid gap-2">
          <button class="btn btn-dark fw-bold w-100" 
                  (click)="addToCart(prod)" 
                  [disabled]="prod.stock === 0 || prod.quantity === 0">
            {{ prod.stock === 0 ? 'No disponible' : 'Agregar al carrito' }}
          </button>
          <button class="btn btn-outline-danger btn-sm" (click)="deleteProduct(prod.id)">
            Eliminar producto
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
